<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container {
            position: relative;
            padding: 15px;
            max-width: 640px;
            margin: 0 auto;
        }
        .img-puxador {
            overflow-x: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .img-puxador::-webkit-scrollbar {
            display: none;
        }
        .img {
            display: flex;
            flex-flow: row nowrap;
            gap: 15px;
        }
        .esquerda,
        .direita {
            position: absolute;
            top: 0;
            left: 0;
            right: auto;
            bottom: 0;
            font-size: 20px;
            line-height: 250px;
            width: 40px;
            text-align: center;
            color: #fff;
            cursor: pointer;
            border: none;
            background: linear-gradient(to left, transparent 0%, black 200%);
            opacity: 0.1;
            transition: all 600ms ease-in-out;
        }
        .direita {
            left: auto;
            right: 0;
            background: linear-gradient(to right, transparent 0%, black 200%);
        }
        .esquerda:hover,
        .direita:hover{
            opacity: 1;
        }
        .item {
            width: 250px;
            height: 250px;
            flex-shrink: 0;
            opacity: 0.6;
            transition: all 600ms ease-in-out;
        }
        .img-atual{
            opacity: 1;
        }
        
        
    </style>
</head>
<body>
    <div class="container">
        <button class="esquerda control" aria-label="Imagem Anterior" ></button>
        <button class="direita control" aria-label="Imagem Sucessor"></button>
        <div class="img-puxador">
            <div class="img">
                <img src="img/cuphead-banner.jpeg" alt="Cabeça de Xícara" class="item img-atual">
                <img src="img/hollow-knight.webp" alt="Cavaleiro Vazio" class="item">
                <img src="img/minecraft-HERO.webp" alt="Minere&Construa" class="item">
                <img src="img/undertale-banner1.png" alt="Conto do Subsolo" class="item">
            </div>
        </div>

    </div>
    <script src="carrosel.js"></script>
</body>
</html>
